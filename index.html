<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>AI Dev English - 42天词汇</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d1a;--s:#151528;--s2:#1e1e38;--bd:#2a2a4a;--ac:#6c63ff;--g:#00d4aa;--p:#ff6b9d;--o:#ffa726;--tx:#e8e8f0;--tx2:#8888aa;--tx3:#555577;--nh:64px;--sb:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter','Noto Sans SC',sans-serif;font-size:14px;background:var(--bg);color:var(--tx);line-height:1.5}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}
#topbar{flex-shrink:0;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:rgba(13,13,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);z-index:10}
.ttl{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.ttl .em{font-size:20px}
.badge{background:var(--ac);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px}
.streak{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--o)}
#screens{flex:1;overflow:hidden;position:relative}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--nh) + var(--sb) + 12px);display:none}
.screen.active{display:flex;flex-direction:column;gap:14px}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nh) + var(--sb));padding-bottom:var(--sb);background:rgba(13,13,26,.97);backdrop-filter:blur(20px);border-top:1px solid var(--bd);display:flex;align-items:center;z-index:100}
.nav{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;cursor:pointer;color:var(--tx3);transition:color .2s;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:inherit}
.nav.on{color:var(--ac)}
.nav.on .ni{transform:scale(1.1)}
.ni{font-size:22px;transition:transform .2s}
.nl{font-size:10px;font-weight:600}
.card{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:16px}
.hero{background:linear-gradient(135deg,#1a1a3a,#0d1a2e);border:1px solid #2a2a5a;border-radius:20px;padding:20px}
.hero-g{font-size:12px;color:var(--ac);font-weight:600;margin-bottom:6px;letter-spacing:1.5px}
.hero-t{font-size:21px;font-weight:800;line-height:1.35;margin-bottom:4px}
.hero-s{font-size:13px;color:var(--tx2);margin-bottom:16px}
.prg{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.prg-ring{position:relative;width:70px;height:70px;flex-shrink:0}
.prg-ring svg{transform:rotate(-90deg)}
.prg-ring circle{fill:none;stroke-width:6}
.prg-ring .bg{stroke:var(--bd)}
.prg-ring .fg{stroke:var(--ac);stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.prg-ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prg-ring .pn{font-size:18px;font-weight:800;color:var(--ac);line-height:1}
.prg-ring .pl{font-size:8px;color:var(--tx3)}
.pi{flex:1}
.pi h3{font-size:14px;font-weight:700;margin-bottom:8px}
.stats{display:flex;flex-direction:column;gap:6px}
.stat{display:flex;align-items:center;justify-content:space-between;font-size:12px}
.stat .l{color:var(--tx2)}
.stat .v{font-weight:700}
.stat .v.g{color:var(--g)}
.stat .v.p{color:var(--ac)}
.actions{display:flex;gap:8px}
.btn{flex:1;background:var(--ac);color:#fff;border:none;border-radius:12px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;-webkit-tap-highlight-color:transparent}
.btn:active{transform:scale(.97);opacity:.9}
.btn.s{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.sl{font-size:11px;font-weight:700;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.wg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.wd{aspect-ratio:1;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:all .2s}
.wd.done{background:var(--ac);color:#fff}
.wd.today{background:var(--g);color:#000;border-color:#fff}
.wd.future{background:var(--s2);color:var(--tx3)}
.dp{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:4px 0}
.dp::-webkit-scrollbar{display:none}
.dt{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--s);color:var(--tx2);transition:all .2s;font-family:inherit;white-space:nowrap}
.dt.on{background:var(--ac);border-color:var(--ac);color:#fff}
.wb{background:linear-gradient(135deg,var(--ac),#9b59b6);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.wb .em{font-size:26px}
.wb .ti{flex:1}
.wb .ti h3{font-size:14px;font-weight:800}
.wb .ti p{font-size:12px;opacity:.85}
.wb .dy{text-align:center}
.wb .dy .n{font-size:22px;font-weight:800;color:rgba(255,255,255,.95)}
.wb .dy .d{font-size:10px;opacity:.7}
.vd{display:flex;flex-direction:column;gap:8px}
.vw{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:14px}
.vr{display:flex;align-items:flex-start;gap:12px}
.vn{width:26px;height:26px;background:var(--s2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tx2);flex-shrink:0}
.vb{flex:1;min-width:0}
.vb .en{font-size:15px;font-weight:800;word-break:break-all}
.vb .ph{font-size:11px;color:var(--g);margin:2px 0}
.vb .cn{font-size:12px;color:var(--tx2)}
.vb .df{font-size:11px;color:var(--tx);font-style:italic;margin-top:3px;min-height:14px}
.vb .ex{font-size:10px;color:var(--tx2);margin-top:5px;padding:5px 8px;background:rgba(108,99,255,.07);border-left:3px solid var(--ac);border-radius:0 6px 6px 0;white-space:pre-wrap;word-break:break-all;line-height:1.4}
.va{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.vb2{flex:1;min-width:55px;padding:6px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:3px}
.vb2.tts{background:rgba(108,99,255,.15);color:var(--ac)}
.vb2.rc{background:rgba(0,212,170,.12);color:var(--g)}
.vb2.lrn{border:1.5px solid var(--g);color:var(--g);background:rgba(0,212,170,.05)}
.vb2.ld{border:1.5px solid var(--ac);color:var(--ac);background:rgba(108,99,255,.08)}
.qc{background:var(--s);border:1px solid var(--bd);border-radius:20px;padding:24px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.qw{font-size:26px;font-weight:800}
.qp{font-size:13px;color:var(--g)}
.qq{font-size:12px;color:var(--tx2)}
.qo{padding:11px 15px;border-radius:12px;border:1.5px solid var(--bd);background:var(--s2);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left;color:var(--tx);width:100%;transition:all .15s}
.qo:active{transform:scale(.98)}
.qo.correct{border-color:var(--g);background:rgba(0,212,170,.12);color:var(--g)}
.qo.wrong{border-color:var(--p);background:rgba(255,107,157,.12);color:var(--p)}
.qo.disabled{opacity:.35;cursor:not-allowed}
.ri{background:var(--s);border:1px solid var(--bd);border-radius:20px;padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.rb{width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;font-size:26px;background:linear-gradient(135deg,var(--p),#ff4081);color:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.rb:active{transform:scale(.9)}
.rb.recording{animation:rp 1.2s infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,.5)}50%{box-shadow:0 0 0 14px rgba(255,107,157,0)}}
.rb2{width:44px;height:44px;border-radius:50%;background:var(--g);border:none;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.rb2:active{transform:scale(.9)}
.rw{font-size:26px;font-weight:800}
.rp{font-size:13px;color:var(--g)}
.rh{font-size:11px;color:var(--tx2)}
.ch{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--s);border-radius:14px;border:1px solid var(--bd)}
.ch .av{width:44px;height:44px;background:linear-gradient(135deg,var(--ac),#9b59b6);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ch h3{font-size:14px;font-weight:700}
.ch p{font-size:11px;color:var(--g)}
#msgs{flex:1;display:flex;flex-direction:column;gap:10px;min-height:0;overflow-y:auto}
.mg{display:flex;gap:8px;animation:mi .3s ease}
@keyframes mi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.mg.user{flex-direction:row-reverse}
.ma{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.mg.ai .ma{background:linear-gradient(135deg,var(--ac),#9b59b6)}
.mg.user .ma{background:var(--g)}
.mb{max-width:76%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.mg.ai .mb{background:var(--s2);border:1px solid var(--bd);border-radius:4px 16px 16px 16px}
.mg.user .mb{background:var(--ac);border-radius:16px 4px 16px 16px;color:#fff}
#input-area{position:fixed;bottom:calc(var(--nh) + var(--sb));left:0;right:0;background:rgba(13,13,26,.97);backdrop-filter:blur(20px);padding:8px 16px;padding-bottom:calc(8px + var(--sb));border-top:1px solid var(--bd);display:flex;gap:8px;align-items:flex-end;z-index:99}
#txt{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:24px;padding:10px 16px;font-size:14px;color:var(--tx);font-family:inherit;resize:none;max-height:120px;outline:none;line-height:1.4}
#txt:focus{border-color:var(--ac)}
#snd{width:44px;height:44px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#snd:active{transform:scale(.9)}
#snd:disabled{opacity:.35;cursor:not-allowed}
#api-ntc{background:rgba(255,167,38,.12);border:1px solid rgba(255,167,38,.3);border-radius:10px;padding:10px 12px;font-size:12px;color:var(--o);display:flex;align-items:center;gap:8px}
.sc{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:2px 0}
.sc::-webkit-scrollbar{display:none}
.st{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--s);color:var(--tx2);transition:all .2s;font-family:inherit;white-space:nowrap}
.st.on{background:var(--g);border-color:var(--g);color:#000}
.se{background:var(--s);border:1px solid var(--bd);border-radius:16px;padding:16px}
.se h3{font-size:15px;font-weight:800;margin-bottom:4px}
.se p{font-size:12px;color:var(--tx2);margin-bottom:14px}
.ss{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.ss:last-child{border-bottom:none}
.sn{width:26px;height:26px;background:rgba(108,99,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ac);flex-shrink:0}
.sb{flex:1}
.sb h4{font-size:13px;font-weight:700;margin-bottom:3px}
.sb p{font-size:11px;color:var(--tx2);margin-bottom:5px;line-height:1.5}
.sb pre{background:#0a0a1a;border-radius:8px;padding:7px 10px;font-size:11px;color:var(--g);font-family:'Courier New',monospace;overflow-x:auto;white-space:pre;margin-top:5px}
.sb .phrase{background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--g);margin-top:5px;font-style:italic}
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tm{background:var(--s);border:1.5px solid var(--bd);border-radius:16px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s}
.tm:active{transform:scale(.97)}
.tm .ic{font-size:26px;margin-bottom:6px}
.tm .nm{font-size:12px;font-weight:700;margin-bottom:3px}
.tm .dc{font-size:10px;color:var(--tx2);line-height:1.4}
::-webkit-scrollbar{width:0;height:0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--s);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px}
.mt{font-size:18px;font-weight:800;margin-bottom:16px;text-align:center}
.ki{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--tx);font-family:inherit;outline:none;margin-bottom:12px}
.ki:focus{border-color:var(--ac)}
.sk{width:100%;background:var(--ac);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.ki2{margin-top:12px;background:rgba(108,99,255,.1);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--tx2);line-height:1.6}
</style>

<body>
<div id="app">
<div id="screens">
<div id="homeScr" class="screen active">
      <div class="card hero">
        <div class="hero-g">AI Dev English</div>
        <div class="hero-t">42天编程英语<br>学习挑战</div>
        <div class="hero-s">从零开始，编程+英语双提升</div>
        <div class="prg">
          <div class="prg-ring">
            <svg width="70" height="70" viewBox="0 0 70 70">
              <circle class="bg" cx="35" cy="35" r="28"/>
              <circle class="fg" id="pg" cx="35" cy="35" r="28"
                stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
            </svg>
            <div class="pct" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
              <span class="pn" id="pp">0%</span>
              <span class="pl">完成</span>
            </div>
          </div>
          <div class="pi">
            <h3>你的学习进度</h3>
            <div class="stats">
              <div class="stat"><span class="l">当前阶段</span><span class="v" id="pw">Week 1 · Python 基础</span></div>
              <div class="stat"><span class="l">学习天数</span><span class="v p" id="ld">1 / 42 天</span></div>
              <div class="stat"><span class="l">今日词汇</span><span class="v" id="twc">0个</span></div>
              <div class="stat"><span class="l">已掌握</span><span class="v g" id="mc">0个</span></div>
            </div>
          </div>
        </div>
        <div class="actions">
          <button class="btn" onclick="sd(st.day&lt;42?st.day+1:42)">继续学习 →</button>
          <button class="btn s" onclick="nav('vocab')">查看词汇 →</button>
        </div>
      </div>

      <div class="card">
        <div class="sl">学习日历</div>
        <div class="wg" id="wg"></div>
      </div>

      <div class="card">
        <div class="sl">今日预览（前3词）</div>
        <div id="tp"></div>
      </div>
    </div>

    <div id="vocabScr" class="screen">
      <div style="display:flex;align-items:center;gap:12px;padding:0 0 12px">
        <button class="btn s" onclick="nav('home')" style="flex:none;padding:8px 14px">← 返回</button>
        <div style="display:flex;align-items:center;gap:8px;flex:1">
          <span id="wbEm" style="font-size:20px">⭐</span>
          <div>
            <div id="wbN" style="font-weight:700;font-size:14px">Week 1</div>
            <div id="wbT" style="font-size:11px;color:var(--tx2)"></div>
          </div>
          <div id="wbD" style="margin-left:auto;font-weight:800;font-size:22px"></div>
        </div>
      </div>
      <div class="dp" id="dp"></div>
      <div id="vd"></div>
      <div id="rc"></div>
    </div>

    <div id="practiceScr" class="screen">
      <div style="padding:0 0 12px;display:flex;align-items:center;gap:12px">
        <button class="btn s" onclick="nav('home')" style="flex:none;padding:8px 14px">← 返回</button>
        <div style="font-weight:700;font-size:16px">词汇练习</div>
      </div>
      <div id="qz"></div>
    </div>

    <div id="sceneScr" class="screen">
      <div style="padding:0 0 12px;display:flex;align-items:center;gap:12px">
        <button class="btn s" onclick="nav('home')" style="flex:none;padding:8px 14px">← 返回</button>
        <div style="font-weight:700;font-size:16px">真实场景</div>
      </div>
      <div class="sc" id="sct"></div>
      <div class="se" id="scc"></div>
    </div>

    <div id="chatScr" class="screen">
      <div style="padding:0 0 12px;display:flex;align-items:center;gap:12px">
        <button class="btn s" onclick="nav('home')" style="flex:none;padding:8px 14px">← 返回</button>
        <div style="font-weight:700;font-size:16px" id="ctl">AI 对话</div>
        <button class="btn s" onclick="showModal()" style="flex:none;padding:8px 14px;margin-left:auto">🔑 API Key</button>
      </div>
      <div id="api-ntc" class="api-ntc" style="margin-bottom:12px">
        <span>⚠️</span>
        <span style="flex:1">需要设置 OpenAI API Key 才能使用 AI 对话（免费 $5）</span>
        <button class="btn" onclick="showModal()" style="flex:none;padding:6px 12px;font-size:12px">设置</button>
      </div>
      <div id="msgs" style="flex:1;min-height:0"></div>
      <div id="input-area" style="position:static;background:transparent;border:none;padding:8px 0 0;display:flex;gap:8px">
        <textarea id="txt" rows="2" placeholder="用英语提问或练习..." style="flex:1;resize:none;border-radius:24px;background:var(--s2);border:1px solid var(--bd);color:var(--tx);padding:10px 16px;font-size:14px;font-family:inherit;outline:none;line-height:1.4"></textarea>
        <button id="snd" onclick="send()" style="width:44px;height:44px;border-radius:50%;background:var(--ac);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">↑</button>
      </div>
    </div>
</div>
<nav id="nav">
<button class="nav on" data-nav="home" onclick="nav('home')">
      <span class="ni">🏠</span><span class="nl">首页</span>
    </button>
    <button class="nav" data-nav="vocab" onclick="nav('vocab')">
      <span class="ni">📖</span><span class="nl">词汇</span>
    </button>
    <button class="nav" data-nav="practice" onclick="nav('practice')">
      <span class="ni">🎯</span><span class="nl">练习</span>
    </button>
    <button class="nav" data-nav="scene" onclick="nav('scene')">
      <span class="ni">💻</span><span class="nl">场景</span>
    </button>
    <button class="nav" data-nav="chat" onclick="startChat()">
      <span class="ni">🤖</span><span class="nl">AI对话</span>
    </button>
</nav>
</div>
<div class="overlay" id="ov">
  <div class="modal">
    <div style="width:40px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px"></div>
    <div class="mt">设置 API Key</div>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:16px;text-align:center">
      使用 OpenAI API Key（免费 $5额度）<br>
      获取地址：<a href="https://platform.openai.com" target="_blank" style="color:var(--ac)">platform.openai.com</a>
    </p>

const W=['Python 基础 + 英文环境热身','GitHub 深度 + 开源发现','AI API 调用 + Prompt 工程','开源贡献冲刺 + PR 实战','AI 应用作品集开发','习惯养成 + 长期规划'];
const EMO=['#27ae60','#f39c12','#2980b9','#8e44ad','#c0392b','#2c3e50'];
const ESC=function(s){return String(s).replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>')};
const $=function(id){return document.getElementById(id)};
var st={day:1,vDay:1,sIdx:0,msgs:[],typing:false};
try{Object.assign(st,JSON.parse(localStorage.getItem('aidev')||'{}'))}catch(e){}
function save(){localStorage.setItem('aidev',JSON.stringify(st))}
function gw(d){return V.filter(function(v){return v[0]===d})}
function gwk(d){return d<=7?0:d<=14?1:d<=21?2:d<=28?3:d<=35?4:5}
function mastered(){return V.filter(function(v){return v[0]<=st.day&&localStorage.getItem('m_'+v[0]+'_'+v[1].replace(/\s/g,'_'))==='1'}).length}
function lsp(k,v){if(v===undefined)return localStorage.getItem(k);localStorage.setItem(k,v==null?'':v)}

function nav(id){
  try{
    var ss=document.querySelectorAll('.screen');
    for(var i=0;i<ss.length;i++)ss[i].classList.remove('active');
    var ns=document.querySelectorAll('.nav');
    for(var i=0;i<ns.length;i++)ns[i].classList.remove('on');
    var scr=document.getElementById(id+'Scr');
    if(scr)scr.classList.add('active');
    var nb=document.querySelector('[data-nav="'+id+'"]');
    if(nb)nb.classList.add('on');
    if(id==='vocab')rv(st.vDay);
    if(id==='practice')rp();
    if(id==='scene')rs(st.sIdx);
    window.scrollTo(0,0)
  }catch(e){console.error('nav error:',e)}
}

function rh(){
  var tv=gw(st.day),ml=mastered(),pct=Math.round(st.day/42*100),wk=gwk(st.day);
  var fg=document.getElementById('pg');
  if(fg)fg.style.strokeDashoffset=175.9*(1-pct/100);
  $('pp').textContent=pct+'%';
  $('pw').textContent='Week '+(wk+1)+' · '+W[wk].split(' +')[0];
  $('twc').textContent=tv.length+'个';
  $('mc').textContent=ml+'个';
  $('ld').textContent=st.day+' / 42 天';
  var wg='';
  for(var i=1;i<=42;i++){
    var cls=i<st.day?'done':i===st.day?'today':'future';
    var bg=EMO[gwk(i)];
    var sty=cls!=='future'?'background:'+bg+';':'';
    var mc=V.filter(function(x){return x[0]<i&&lsp('m_'+x[0]+'_'+x[1].replace(/\s/g,'_'))==='1'}).length;
    var ttl=gw(i).length;
    var p2=ttl>0?Math.round(mc/ttl*100):0;
    wg+='<button class="wd '+cls+'" onclick="sd('+i+')" style="'+sty+'">'+i+'<div style="font-size:7px;opacity:.8">'+p2+'%</div></button>';
  }
  $('wg').innerHTML=wg;
  var tp='';
  tv.slice(0,3).forEach(function(v,i){
    tp+='<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)"><div style="flex:1"><div style="font-weight:700">'+ESC(v[1])+'</div><div style="font-size:11px;color:var(--g)">'+ESC(v[2])+' · '+ESC(v[3])+'</div></div><button style="font-size:18px;background:none;border:none;cursor:pointer;color:var(--tx2)" onclick="speak(\''+ESC(v[1]).replace(/'/g,"\\'")+'\')">🔊</button></div>';
  });
  if(!tv.length)tp='<div style="text-align:center;padding:20px 0;color:var(--tx3)">今天暂无词汇</div>';
  $('tp').innerHTML=tp;
}

function sd(d){st.day=d;st.vDay=d;save();rh();nav('vocab')}

function rv(day){
  st.vDay=day;
  var wk=gwk(day),tv=gw(day);
  var ems=['⭐','🟡','🔵','🟣','🔴','⚫'];
  var em=ems[wk]||'⭐';
  $('wbEm').textContent=em;
  $('wbN').textContent='Week '+(wk+1);
  $('wbT').textContent=W[wk];
  $('wbD').textContent=day;
  var dp='';
  for(var i=1;i<=42;i++)dp+='<button class="dt'+(i===day?' on':'')+'" onclick="rv('+i+')">'+i+'</button>';
  $('dp').innerHTML=dp;
  var vd='';
  tv.forEach(function(v,i){
    var k='m_'+v[0]+'_'+v[1].replace(/\s/g,'_');
    var done=lsp(k)==='1';
    vd+='<div class="card" style="padding:14px"><div style="display:flex;align-items:flex-start;gap:12px"><div class="vn">'+(i+1)+'</div><div style="flex:1"><div style="font-size:17px;font-weight:800">'+ESC(v[1])+'</div><div style="font-size:11px;color:var(--g);margin:2px 0">'+ESC(v[2])+'</div><div style="font-size:13px;color:var(--tx2);margin-bottom:4px">'+ESC(v[3])+'</div>';
    if(v[4])vd+='<div style="font-size:12px;color:var(--tx);font-style:italic">'+ESC(v[4])+'</div>';
    if(v[5])vd+='<div style="font-size:11px;color:var(--tx2);margin-top:4px;padding:5px 8px;background:rgba(108,99,255,.07);border-left:3px solid var(--ac);border-radius:0 6px 6px 0">'+ESC(v[5])+'</div>';
    vd+='</div></div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap"><button class="vb2 tts" onclick="speak(\'\''+ESC(v[1]).replace(/\'/g,"\\'\'")+\'\'')">🔊 发音</button><button class="vb2 rc" onclick="openRecPanel(\'\''+ESC(v[1]).replace(/\'/g,"\\'\'")+\'\'')">🎤 跟读</button><button class="vb2 '+(done?'ldn':'btn')+'" onclick="toggleM(\'\''+v[0]+'\'',\'\''+ESC(v[1]).replace(/\'/g,"\\'\'")+'\'',this)">'+(done?'✅ 已掌握':'○ 标记掌握')+'</button></div></div>';
  });
  $('vd').innerHTML=vd;
}

function toggleM(day,word,btn){
  var k='m_'+day+'_'+word.replace(/\s/g,'_');
  var v=lsp(k);
  var now='1';
  lsp(k,v==='1'?null:now);
  var isDone=lsp(k)===now;
  // Update only the clicked button
  if(btn){
    if(isDone){
      btn.innerHTML='✅ 已掌握';
      btn.className='vb2 ldn';
    } else {
      btn.innerHTML='○ 标记掌握';
      btn.className='vb2 btn';
    }
  }
  rh();
}

function speak(w){
  if(!window.speechSynthesis)return;
  var u=new SpeechSynthesisUtterance(w);
  u.lang='en-US';u.rate=0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

var sr=null;

function openRecPanel(word){
  var rhint=document.getElementById('rhint');
  var rresult=document.getElementById('rresult');
  var recBtn=document.getElementById('recBtn');
  var panel=document.getElementById('recPanel');
  if(!panel){
    panel=document.createElement('div');
    panel.id='recPanel';
    panel.style.cssText='position:fixed;top:56px;left:0;right:0;z-index:500;background:var(--s);border-bottom:1px solid var(--bd);padding:16px;display:none;flex-direction:column;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,.4)';
    document.body.appendChild(panel);
  }
  panel.innerHTML='<div style="font-size:16px;font-weight:800;color:var(--ac);margin-bottom:4px">跟读练习</div>'+
    '<div style="font-size:22px;font-weight:800">'+ESC(word)+'</div>'+
    '<button id="recBtn" onclick="toggleRec(\''+word.replace(/\'/g,"\\\'")+'\')" style="width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--p),#ff4081);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all .2s">🎤</button>'+
    '<div id="rhint" style="font-size:12px;color:var(--tx2)">点击开始跟读</div>'+
    '<div id="rresult" style="text-align:center;min-height:24px;width:100%"></div>'+
    '<button class="btn" onclick="toggleM(st.vDay,\'\''+word.replace(/\'/g,"\\'\'")+'\'',this)" id="rMarkBtn" style="margin-top:4px">○ 标记掌握</button>'+
    '<button class="btn s" onclick="closeRecPanel()" style="width:100%;margin-top:4px">❌ 关闭</button>';
  panel.style.display='flex';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeRecPanel(){
  var panel=document.getElementById('recPanel');
  if(panel) panel.style.display='none';
  if(sr){try{sr.stop()}catch(e){}sr=null;}
}

function toggleRec(word){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    var rresult=document.getElementById('rresult');
    if(rresult) rresult.innerHTML='<div style="color:var(--p);font-size:13px">当前浏览器不支持语音识别，请使用 Safari 或 Chrome</div>';
    return;
  }
  var recBtn=document.getElementById('recBtn');
  var rhint=document.getElementById('rhint');
  var rresult=document.getElementById('rresult');
  if(sr && sr.recording){
    sr.stop();
    return;
  }
  var SR=window.SpeechRecognition || window.webkitSpeechRecognition;
  sr=new SR();
  sr.lang='en-US';
  sr.interimResults=true;
  sr.maxAlternatives=3;
  sr.recording=true;
  if(recBtn){recBtn.textContent='⏹';recBtn.style.cssText='width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;background:var(--p);color:#fff;font-size:26px;animation:rp 1.2s infinite';}
  if(rhint)rhint.textContent='请朗读上方单词...';
  if(rresult)rresult.innerHTML='';
  sr.onresult=function(e){
    var results=Array.from(e.results).map(function(r){return r[0].transcript}).join('');
    var alt=e.results[e.results.length-1];
    if(alt.isFinal){
      sr.recording=false;
      var spoken=results.trim().toLowerCase();
      var target=word.toLowerCase();
      var score=similarity(spoken,target);
      var stars=score>=0.8?'🌟🌟🌟':score>=0.6?'🌟🌟':score>=0.4?'🌟':'';
      var col=score>=0.6?'var(--g)':score>=0.4?'var(--o)':'var(--p)';
      var tip='';
      if(score<0.4) tip='<div style="color:var(--tx2);font-size:11px;margin-top:4px">提示：注意发音，点击上方 🎤 听标准发音</div>';
      if(rresult) rresult.innerHTML='<div style="color:'+col+';font-size:14px;font-weight:700;margin:4px 0">"'+ESC(results)+'"</div>'+
        '<div style="font-size:13px;color:var(--tx2);margin-bottom:4px">相似度: '+Math.round(score*100)+'% '+stars+'</div>'+tip;
      if(recBtn){recBtn.textContent='🔄';recBtn.style.cssText='width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:var(--g);color:#000;font-size:18px;display:flex;align-items:center;justify-content:center';}
      if(rhint)rhint.textContent='点击重新跟读';
    } else {
      if(rresult) rresult.innerHTML='<div style="color:var(--tx2);font-size:13px;font-style:italic">"'+ESC(results)+'"...</div>';
    }
  };
  sr.onerror=function(e){
    sr.recording=false;
    if(recBtn){recBtn.textContent='🎤';recBtn.style.cssText='width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,var(--p),#ff4081);color:#fff;font-size:26px';}
    if(rhint)rhint.textContent='点击开始跟读';
    if(rresult){
      if(e.error==='not-allowed') rresult.innerHTML='<div style="color:var(--p);font-size:13px">请在浏览器设置中允许麦克风权限</div>';
      else rresult.innerHTML='<div style="color:var(--p);font-size:13px">识别出错: '+e.error+'，请重试</div>';
    }
  };
  sr.onend=function(){
    if(sr && !sr.recording && recBtn){recBtn.textContent='🔄';recBtn.style.cssText='width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;background:var(--g);color:#000;font-size:18px;display:flex;align-items:center;justify-content:center';}
  };
  sr.start();
}

function similarity(a,b){
  if(a===b) return 1;
  if(a.length===0||b.length===0) return 0;
  var la=a.toLowerCase(),lb=b.toLowerCase();
  if(la===lb) return 1;
  if(la.includes(lb)||lb.includes(la)) return 0.7;
  var al=la.length,bl=lb.length;
  var dp=[];
  for(var i=0;i<=al;i++) dp[i]=[i];
  for(var j=0;j<=bl;j++) dp[0][j]=j;
  for(var i=1;i<=al;i++){
    for(var j=1;j<=bl;j++){
      dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+(la[i-1]===lb[j-1]?0:1));
    }
  }
  return 1-dp[al][bl]/Math.max(al,bl);
}


function rp(){
  var words=gw(st.vDay);
  if(!words.length){$('qz').innerHTML='<div class="card" style="text-align:center;padding:40px 20px;color:var(--tx3)">先选择一个有词汇的学习日</div>';return;}
  var q=words[Math.floor(Math.random()*words.length)];
  var wrongs=words.filter(function(v){return v!==q}).sort(function(){return Math.random()-0.5}).slice(0,3);
  var opts=[q].concat(wrongs).sort(function(){return Math.random()-0.5});
  var html='<div class="card" style="text-align:center;padding:24px 20px"><div class="sl">选择英文单词</div><div style="font-size:24px;font-weight:800;margin:12px 0;color:var(--ac)">'+ESC(q[3])+'</div>';
  opts.forEach(function(o){html+='<button class="qo" onclick="checkAns(this,\''+ESC(q[1]).replace(/'/g,"\\'")+'\','+(o[1]===q[1])+')" style="width:100%;padding:12px;margin:6px 0;border-radius:12px;border:1.5px solid var(--bd);background:var(--s2);font-size:13px;font-weight:600;cursor:pointer;color:var(--tx);font-family:inherit;text-align:left">'+ESC(o[1])+'</button>'});
  html+='<div id="qres" style="margin-top:12px"></div></div>';
  $('qz').innerHTML=html;
}

function checkAns(btn,correct,ok){
  var qos=document.querySelectorAll('.qo');
  for(var i=0;i<qos.length;i++)qos[i].disabled=true;
  btn.style.borderColor=ok?'var(--g)':'var(--p)';
  btn.style.background=ok?'rgba(0,212,170,.12)':'rgba(255,107,157,.12)';
  if(!ok){var w=document.querySelector('.qo:not([style*="border-color: var(--g)"])');
    if(w){w.style.borderColor='var(--g)';w.style.background='rgba(0,212,170,.12)'}}
  $('qres').innerHTML=ok?'<span style="color:var(--g);font-weight:700">✅ 正确！</span>':'<span style="color:var(--p);font-weight:700">❌ 正确是：'+ESC(correct)+'</span> <button class="btn" onclick="rp()" style="margin-top:8px">下一题 →</button>';
}

function rs(idx){
  st.sIdx=idx;
  var sc=SC[idx],ph=SP[idx];
  var tabs='';
  SC.forEach(function(s,i){tabs+='<button class="st'+(i===idx?' on':'')+'" onclick="rs('+i+')">'+s+'</button>'});
  $('sct').innerHTML=tabs;
  var steps=[{t:'场景理解',d:'了解真实编程中的'+sc+'场景'},{t:'核心表达',d:ph},{t:'跟AI练习',d:'用英语进行'+sc+'练习'}];
  var body='<h3 style="font-size:16px;font-weight:800;margin-bottom:8px">'+ESC(sc)+'</h3><p style="font-size:12px;color:var(--g);margin-bottom:14px">Topic: '+ESC(ph)+'</p>';
  steps.forEach(function(s,i){
    body+='<div class="ss"><div class="sn">'+(i+1)+'</div><div class="sb"><h4>'+ESC(s.t)+'</h4><p>'+ESC(s.d)+'</p></div></div>';
  });
  body+='<div class="ch" style="margin-top:12px;background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.3)">💬 '+ESC(ph)+'</div>';
  $('scc').innerHTML=body;
  $('ctl').textContent=sc;
}

function showModal(){$('ov').classList.add('on');$('ki').focus()}
function saveKey(){
  var k=$('ki').value.trim();
  if(k&&k.startsWith('sk-')){
    localStorage.setItem('apikey',k);
    $('ov').classList.remove('on');
    $('api-ntc').style.display='none';
    startChat();
  }else{alert('请输入有效的 sk- 开头 API Key')}
}

function startChat(){
  nav('chat');
  if(!st.msgs||!st.msgs.length){
    st.msgs=[{role:'assistant',content:'Hi! I am your AI tutor. Today we practice: '+SC[st.sIdx]+'. '+SP[st.sIdx]+' What would you like to say?'}];
    renderMsgs();
  }
  if(!localStorage.getItem('apikey'))$('api-ntc').style.display='flex';
}

function renderMsgs(){
  var html='';
  for(var i=0;i<(st.msgs||[]).length;i++){
    var m=st.msgs[i];
    html+='<div class="mg '+(m.role==='user'?'user':'')+'"><div class="ma">'+(m.role==='ai'?'🤖':'😊')+'</div><div class="mb">'+ESC(m.content||m)+'</div></div>';
  }
  if(st.typing)html+='<div class="mg ai"><div class="ma">🤖</div><div class="mb">思考中...</div></div>';
  $('msgs').innerHTML=html;
  $('msgs').parentElement.scrollTop=1e9;
}

async function send(){
  var txt=$('txt').value.trim();
  if(!txt)return;
  $('txt').value='';
  st.msgs.push({role:'user',content:txt});
  renderMsgs();
  st.typing=true;renderMsgs();
  var key=localStorage.getItem('apikey');
  if(!key){st.msgs.push({role:'assistant',content:'Please set OpenAI API Key first (click the 🔑 button)'});st.typing=false;renderMsgs();return;}
  try{
    var res=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-3.5-turbo',messages:[
        {role:'system',content:'You are a friendly AI English tutor for a Chinese developer. Keep responses short (2-3 sentences). Correct grammar gently.'},
        {role:'assistant',content:'Today we practice: '+SC[st.sIdx]+'. '+SP[st.sIdx]},
        st.msgs[st.msgs.length-1]
      ]})
    });
    var d=await res.json();
    st.msgs.push({role:'assistant',content:d.choices[0].message.content});
  }catch(e){st.msgs.push({role:'assistant',content:'Error: '+e.message})}
  st.typing=false;save();renderMsgs();
}

$('txt').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});

document.addEventListener('DOMContentLoaded',function(){
  if(!localStorage.getItem('apikey'))$('api-ntc').style.display='flex';
  rh();
});

</script>
